name: Build Steam wrapper

on:
  push:
    paths:
      - 'SteamFix/steamwebhelper_wrapper.c'
      - '.github/workflows/build-wrapper.yml'
  pull_request:
    paths:
      - 'SteamFix/steamwebhelper_wrapper.c'
  workflow_dispatch:

jobs:
  build:
    name: Cross-compile steamwebhelper wrapper
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        run: brew install mingw-w64

      - name: Compile wrapper
        run: |
          cd SteamFix
          x86_64-w64-mingw32-gcc steamwebhelper_wrapper.c \
            -o steamwebhelper_wrapper.exe -mwindows -O2 -municode
          file steamwebhelper_wrapper.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steamwebhelper_wrapper
          path: SteamFix/steamwebhelper_wrapper.exe
